version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16                   # PostgreSQL ที่มี pgvector ติดมาด้วยจาก Docker Hub
    container_name: agent_memory_db                 # container_name → ชื่อ container ที่จะรัน
    environment:    
      POSTGRES_USER: ${DB_USER}                     # ใช้ชั่วคราว
      POSTGRES_PASSWORD: ${DB_PASSWORD}             # ใช้ชั่วคราว
      POSTGRES_DB: ${DB_NAME}                       # ใช้ชั่วคราว
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data             # volumes → เก็บข้อมูลไว้ถาวร

volumes:
  pgdata: